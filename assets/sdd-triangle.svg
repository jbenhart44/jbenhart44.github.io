<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 380" width="440" height="380" role="img" aria-labelledby="sddTitle sddDesc">
  <title id="sddTitle">Plan-Construct-Verify loop with toolkit commands on each vertex</title>
  <desc id="sddDesc">An equilateral triangle showing the three stages of Spec-Driven Development. Plan vertex at top, Construct vertex at lower right, Verify vertex at lower left (accented in red). Curved arrows show clockwise flow. Each vertex is labeled with the toolkit commands that execute that stage.</desc>

  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background triangle (subtle fill) -->
  <polygon points="220,55 365,305 75,305" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Clockwise arrows (Plan -> Construct -> Verify -> Plan) -->
  <!-- Plan (top) -> Construct (bottom-right) -->
  <path d="M 245,80 Q 345,160 355,275" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Construct (bottom-right) -> Verify (bottom-left) -->
  <path d="M 335,320 Q 220,345 105,320" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Verify (bottom-left) -> Plan (top) -->
  <path d="M 85,275 Q 95,160 195,80" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vertex circles -->
  <!-- Plan (top) -->
  <circle cx="220" cy="55" r="32" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="220" y="60" text-anchor="middle" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="700">Plan</text>

  <!-- Construct (bottom-right) -->
  <circle cx="365" cy="305" r="32" fill="#10b981" stroke="#047857" stroke-width="2"/>
  <text x="365" y="310" text-anchor="middle" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="700">Construct</text>

  <!-- Verify (bottom-left, accent red) -->
  <circle cx="75" cy="305" r="32" fill="#CC0000" stroke="#990000" stroke-width="2"/>
  <text x="75" y="310" text-anchor="middle" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="700">Verify</text>

  <!-- Command labels at each vertex -->
  <!-- Plan commands (above) -->
  <text x="220" y="18" text-anchor="middle" fill="#374151" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="13" font-weight="600">/pcv  /pcv-research</text>
  <text x="220" y="35" text-anchor="middle" fill="#6b7280" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="11">/coa  /charge</text>

  <!-- Construct commands (to the right of bottom-right vertex) -->
  <text x="365" y="358" text-anchor="middle" fill="#374151" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="13" font-weight="600">/readable  /quarto</text>
  <text x="365" y="375" text-anchor="middle" fill="#6b7280" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="11">/commit</text>

  <!-- Verify commands (to the left of bottom-left vertex) -->
  <text x="75" y="358" text-anchor="middle" fill="#374151" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="13" font-weight="600">/pace  /audit</text>
  <text x="75" y="375" text-anchor="middle" fill="#6b7280" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="11">/review  /simplify</text>
</svg>
